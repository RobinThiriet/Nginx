services:
  nginx:
    image: nginx:alpine
    container_name: nginx-lab
    init: true
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.dev}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/auth:/etc/nginx/auth:ro
      - ./sites:/usr/share/nginx/lab-sites:ro
      - ./sites/certbot:/var/www/certbot
      - ./certs:/etc/nginx/certs:ro
      - ./certs/letsencrypt:/etc/letsencrypt:ro
      - ./logs:/var/log/nginx
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app1
      - app2
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - edge
      - app_net

  app1:
    image: traefik/whoami:latest
    container_name: nginx-lab-app1
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    networks:
      - app_net

  app2:
    image: traefik/whoami:latest
    container_name: nginx-lab-app2
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    networks:
      - app_net

  api:
    image: ealen/echo-server:latest
    container_name: nginx-lab-api
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    environment:
      PORT: 80
      ENABLE__ENVIRONMENT: "false"
    networks:
      - app_net

  certbot:
    image: certbot/certbot:latest
    container_name: nginx-lab-certbot
    profiles: ["certbot"]
    volumes:
      - ./certs/letsencrypt:/etc/letsencrypt
      - ./sites/certbot:/var/www/certbot
    networks:
      - edge

networks:
  edge:
    driver: bridge
  app_net:
    driver: bridge
    internal: true

volumes:
  nginx_cache:
