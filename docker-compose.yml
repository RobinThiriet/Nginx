services:
  nginx:
    image: nginx:alpine
    container_name: nginx-lab
    init: true
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ${COMPOSE_ENV_FILE:-.env}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/auth:/etc/nginx/auth:ro
      - ./sites:/usr/share/nginx/lab-sites:ro
      - ./sites/certbot:/var/www/certbot
      - ./certs:/etc/nginx/certs:ro
      - ./certs/letsencrypt:/etc/letsencrypt:ro
      - ./logs:/var/log/nginx
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app1
      - app2
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - edge
      - app_net
      - obs_net

  app1:
    image: traefik/whoami:latest
    container_name: nginx-lab-app1
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    networks:
      - app_net

  app2:
    image: traefik/whoami:latest
    container_name: nginx-lab-app2
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    networks:
      - app_net

  api:
    image: ealen/echo-server:latest
    container_name: nginx-lab-api
    init: true
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    environment:
      PORT: 80
      ENABLE__ENVIRONMENT: "false"
    networks:
      - app_net

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-lab-exporter
    init: true
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --nginx.scrape-uri=http://nginx:80/nginx_status
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      - nginx
    networks:
      - obs_net

  prometheus:
    image: prom/prometheus:latest
    container_name: nginx-lab-prometheus
    init: true
    restart: unless-stopped
    profiles: ["observability"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.external-url=/prometheus/
      - --web.route-prefix=/
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - nginx-exporter
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9090/-/ready >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - obs_net

  grafana:
    image: grafana/grafana-oss:latest
    container_name: nginx-lab-grafana
    init: true
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - obs_net

  certbot:
    image: certbot/certbot:latest
    container_name: nginx-lab-certbot
    profiles: ["certbot"]
    volumes:
      - ./certs/letsencrypt:/etc/letsencrypt
      - ./sites/certbot:/var/www/certbot
    networks:
      - edge

networks:
  edge:
    driver: bridge
  app_net:
    driver: bridge
    internal: true
  obs_net:
    driver: bridge
    internal: true

volumes:
  nginx_cache:
  prometheus_data:
  grafana_data:
