services:
  nginx:
    image: nginx:alpine
    container_name: nginx-lab
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/auth:/etc/nginx/auth:ro
      - ./sites:/usr/share/nginx/lab-sites:ro
      - ./sites/certbot:/var/www/certbot
      - ./certs:/etc/nginx/certs:ro
      - ./logs:/var/log/nginx
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app1
      - app2
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  app1:
    image: traefik/whoami:latest
    container_name: nginx-lab-app1
    restart: unless-stopped

  app2:
    image: traefik/whoami:latest
    container_name: nginx-lab-app2
    restart: unless-stopped

  api:
    image: ealen/echo-server:latest
    container_name: nginx-lab-api
    restart: unless-stopped
    environment:
      PORT: 80
      ENABLE__ENVIRONMENT: "false"

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-lab-exporter
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --nginx.scrape-uri=http://nginx:80/nginx_status
    depends_on:
      - nginx

  prometheus:
    image: prom/prometheus:latest
    container_name: nginx-lab-prometheus
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - nginx-exporter

  grafana:
    image: grafana/grafana-oss:latest
    container_name: nginx-lab-grafana
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  certbot:
    image: certbot/certbot:latest
    container_name: nginx-lab-certbot
    profiles: ["certbot"]
    volumes:
      - ./certs/letsencrypt:/etc/letsencrypt
      - ./sites/certbot:/var/www/certbot

volumes:
  nginx_cache:
  prometheus_data:
  grafana_data:
