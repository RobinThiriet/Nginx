services:
  nginx:
    restart: always
    volumes:
      - ./nginx/templates-prod/default.conf.template:/etc/nginx/templates/default.conf.template:ro

  app1:
    restart: always

  app2:
    restart: always

  api:
    restart: always

  nginx-exporter:
    restart: always
    profiles: []

  prometheus:
    restart: always
    profiles: []
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.external-url=/prometheus/
      - --web.route-prefix=/

  grafana:
    restart: always
    profiles: []
    environment:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
